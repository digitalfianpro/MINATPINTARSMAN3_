            30% { transform: translateX(150%) rotate(30deg); }

    <!-- FIREBASE SDK -->

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>

<body class="bg-[#101015] text-slate-200 font-sans antialiased selection:bg-cyan-500/30 h-screen w-screen overflow-hidden">

    <div id="root" class="h-full w-full"></div>

    <script type="text/babel">
        const { useState, useEffect, useCallback } = React;

        // --- FIREBASE CONFIGURATION & INITIALIZATION ---
        const userFirebaseConfig = {
            apiKey: "AIzaSyAc4cpfZ5ZUUVd83kib7j6FCpzKfmAFEyw",
            authDomain: "minatpintarsman3sorong.firebaseapp.com",
            projectId: "minatpintarsman3sorong",
            storageBucket: "minatpintarsman3sorong.firebasestorage.app",
            messagingSenderId: "810743967203",
            appId: "1:810743967203:web:dabd2567c14f6f670444d6",
            measurementId: "G-86KLG2WX1R"
        };

        const finalConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : userFirebaseConfig;

        if (!firebase.apps.length) {
            firebase.initializeApp(finalConfig);
        }
        
        const firestore = firebase.firestore();
        
        // Optimasi Kinerja: Aktifkan caching offline agar super cepat tanpa lag
        firestore.enablePersistence({ synchronizeTabs: true }).catch((err) => {
            console.warn("Offline persistence not enabled:", err.code);
        });

        const auth = firebase.auth();
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'sman3sorong';
        const dbRef = firestore.collection('artifacts').doc(appId).collection('public').doc('data').collection('edutest_data').doc('main_database');

        const initializeFirestore = async () => {
            try {
                const snap = await dbRef.get();
                if (!snap.exists) {
                    await dbRef.set({
                        activeTests: [],
                        students: [],
                        schoolData: {
                            schoolName: 'SMA NEGERI 3 KOTA SORONG',
                            counselorName: '',
                            counselorNip: '',
                            city: 'Sorong',
                            dateSet: new Date().toISOString().split('T')[0]
                        }
                    });
                }
            } catch (error) {
                console.error("Gagal terhubung ke Firestore.", error);
            }
        };

        // --- DATA MOCKUP & LOGIC ---
        const TEST_CATALOG = [
          { id: 't1', name: 'Tes Kemampuan', desc: 'Evaluasi kognitif dan logika.', icon: <i className="fas fa-chart-line text-lg" /> },
          { id: 't2', name: 'Tes Kepribadian', desc: 'Analisis profil psikologis.', icon: <i className="fas fa-user-check text-lg" /> },
          { id: 't3', name: 'Tes Penjurusan', desc: 'Rekomendasi IPA/IPS/Bahasa.', icon: <i className="fas fa-award text-lg" /> },
          { id: 't4', name: 'Tes Minat & Bakat', desc: 'Pemetaan potensi bakat.', icon: <i className="fas fa-check-circle text-lg" /> },
          { id: 't5', name: 'Tes Gaya Belajar', desc: 'Identifikasi metode belajar.', icon: <i className="fas fa-book-open text-lg" /> }
        ];

        const generateMockQuestions = () => {
          const qs = [];
          for(let i=1; i<=35; i++) {
            if(i <= 30) {
              qs.push({
                id: i,
                type: 'mcq',
                text: `Soal ${i} (Materi Gabungan SMP & SMA): \nPerhatikan skenario berikut. Jika diketahui variabel X = ${i * 2} dan Y = ${i + 5}, manakah pernyataan di bawah ini yang paling tepat menggambarkan hubungan antara teori dasar dan aplikasi praktisnya dalam pemecahan masalah kehidupan sehari-hari?`,
                options: [
                  `Pernyataan A: Menunjukkan hasil yang linier sebesar ${i * 3}`,
                  `Pernyataan B: Analisis alternatif berdasarkan pengamatan sekunder`,
                  `Pernyataan C: Solusi ini paling relevan untuk kasus observasi`,
                  `Pernyataan D: Tidak ada relevansi langsung dengan konteks awal`
                ]
              });
            } else {
              qs.push({
                id: i,
                type: 'essay',
                text: `Soal Uraian ${i} (Analisis Mendalam SMA/SMP): \nBerdasarkan prinsip-prinsip sains dan sosial yang telah dipelajari, uraikan pandangan, evaluasi, serta langkah konkrit yang akan Anda ambil jika dihadapkan pada situasi kritis yang membutuhkan pemecahan masalah multidimensi. Berikan contoh spesifik!`
              });
            }
          }
          return qs;
        };
        const MOCK_QUESTIONS = generateMockQuestions();

        const generateAnalysis = (student) => {
          if (student.status === 'finished') {
            return {
              rekomendasi: "Siswa menunjukkan potensi akademik yang sangat baik (skor di atas rata-rata). Disarankan untuk diarahkan ke peminatan MIPA atau Teknik.",
              tindakLanjut: "Guru BK perlu menjadwalkan sesi konseling karir lanjutan, merekomendasikan siswa pada program pengayaan/olimpiade, dan memonitor perkembangan nilainya bersama wali kelas.",
              saran: "Pertahankan motivasi belajar, rajin berdiskusi, dan latih kemampuan literasi sosial serta komunikasi interpersonal siswa."
            };
          } else if (student.status === 'testing') {
            return {
              rekomendasi: "Proses evaluasi masih berlangsung. Data sementara menunjukkan kecepatan pengerjaan yang stabil.",
              tindakLanjut: "Guru BK harap memantau progres siswa di live dashboard. Hubungi siswa via chat jika waktu hampir habis namun progres soal masih sedikit.",
              saran: "Fokus pada manajemen waktu ujian dan baca setiap instruksi pada soal uraian dengan teliti."
            };
          } else {
            return {
              rekomendasi: "Belum dapat memberikan rekomendasi. Siswa belum memulai atau menyelesaikan modul asesmen.",
              tindakLanjut: "Guru BK segera menghubungi siswa bersangkutan atau wali kelasnya untuk memastikan siswa melakukan login dan segera mengerjakan tes.",
              saran: "Pastikan perangkat siswa memadai dan berikan pemahaman urgensi asesmen ini untuk masa depannya."
            };
          }
        };

        // --- MAIN APP COMPONENT ---
        function App() {
          const [role, setRole] = useState(sessionStorage.getItem('eduTest_role') || null);
          const [isRefreshing, setIsRefreshing] = useState(false);
          const [user, setUser] = useState(null);

          useEffect(() => {
            const initAuth = async () => {
                try {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        await auth.signInWithCustomToken(__initial_auth_token);
                    } else {
                        await auth.signInAnonymously();
                    }
                } catch(e) { console.error("Auth Error:", e); }
            };
            initAuth();

            const unsubscribe = auth.onAuthStateChanged((u) => {
                setUser(u);
                if (u) initializeFirestore();
            });
            
            const urlParams = new URLSearchParams(window.location.search);
            if ((urlParams.get('role') === 'student' || window.location.hash === '#student') && !role) {
              setRole('student');
              sessionStorage.setItem('eduTest_role', 'student');
            }

            return () => unsubscribe();
          }, [role]);

          const selectRole = (selectedRole) => {
            setRole(selectedRole);
            sessionStorage.setItem('eduTest_role', selectedRole);
            try {
              if (window.location.search) window.history.replaceState({}, document.title, window.location.pathname);
            } catch (error) {}
          };

          const handleLogout = () => {
            setRole(null);
            sessionStorage.removeItem('eduTest_role');
            sessionStorage.removeItem('eduTest_studentSession');
            window.location.hash = '';
          };

          const globalRefresh = () => {
            setIsRefreshing(true);
            setTimeout(() => setIsRefreshing(false), 800);
          };

          if (!user) {
              return (
                 <div className="h-full w-full bg-[#101015] flex flex-col items-center justify-center relative">
                     <div className="absolute top-1/4 left-1/4 w-80 h-80 bg-sky-500/10 rounded-full blur-[100px] pointer-events-none"></div>
                     <i className="fas fa-spinner fa-spin text-4xl text-sky-400 mb-4 relative z-10"></i>
                     <p className="text-sky-200/50 font-bold tracking-widest text-sm relative z-10">MENGHUBUNGKAN KE SERVER...</p>
                 </div>
              );
          }

          return (
            <div className="h-full w-full flex flex-col relative overflow-hidden bg-[#101015]">
              {/* HEAVY CYBER LIGHT BLUE BACKLIGHTS */}
              <div className="absolute top-[-15%] left-[-10%] w-[75%] h-[75%] bg-gradient-to-br from-cyan-400/30 via-sky-400/20 to-transparent rounded-full blur-[100px] pointer-events-none"></div>
              <div className="absolute top-[20%] left-[20%] w-[50%] h-[50%] bg-blue-400/20 rounded-full blur-[100px] pointer-events-none"></div>
              <div className="absolute bottom-[-15%] right-[-5%] w-[65%] h-[65%] bg-gradient-to-tl from-cyan-300/30 to-sky-500/15 rounded-full blur-[120px] pointer-events-none"></div>

              {!role && (
                <div className="flex-1 flex items-center justify-center p-4 animate-fade-in z-10 h-full overflow-hidden">
                  <div className="max-w-4xl w-full grid md:grid-cols-2 gap-6 relative">
                    
                    <div className="col-span-full text-center mb-4 flex flex-col items-center">
                      <div className="floating-logo flex flex-col items-center justify-center mb-4">
                        <div className="relative rounded-full p-2.5 bg-white/5 backdrop-blur-xl shadow-[0_0_50px_rgba(34,211,238,0.4)] border-2 border-sky-500/40 shiny-effect mb-4">
                           <img src="https://i.ibb.co/nMH2M1Km/Chat-GPT-Image-20-Mei-2026-12-35-08.png" alt="Logo SMA N 3 Kota Sorong" fetchpriority="high" loading="eager" decoding="sync" className="w-24 h-24 md:w-32 md:h-32 object-contain drop-shadow-2xl" />
                        </div>
                        <h1 className="text-2xl md:text-3xl font-black text-white tracking-widest uppercase drop-shadow-md mb-1">
                          SMA NEGERI 3 KOTA SORONG
                        </h1>
                        <p className="text-sky-400 font-extrabold text-sm tracking-widest uppercase">
                           Portal Asesmen Digital Premium
                        </p>
                      </div>
                    </div>

                    {/* Teacher Card */}
                    <button type="button" onClick={() => selectRole('counselor')} className="group relative p-6 md:p-8 rounded-[2rem] bg-white/5 border border-white/10 shadow-2xl hover:border-sky-500/50 backdrop-blur-md transition-all duration-300 text-left overflow-hidden hover:-translate-y-1 active:scale-95">
                      <div className="absolute inset-0 bg-gradient-to-br from-cyan-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                      <i className="fas fa-users text-4xl text-sky-400 mb-4 relative z-10 drop-shadow-lg"></i>
                      <h2 className="text-2xl font-bold text-white mb-2 relative z-10">Portal Guru BK</h2>
                      <p className="text-slate-400 relative z-10 text-sm leading-relaxed">Kelola sesi tes, aktifkan modul, dan pantau status pengerjaan siswa secara real-time.</p>
                      <div className="mt-6 flex items-center text-sky-400 font-bold opacity-0 group-hover:opacity-100 transform translate-x-[-10px] group-hover:translate-x-0 transition-all duration-300 relative z-10">
                        Masuk Portal <i className="fas fa-chevron-right ml-2"></i>
                      </div>
                    </button>

                    {/* Student Card */}
                    <button type="button" onClick={() => selectRole('student')} className="group relative p-6 md:p-8 rounded-[2rem] bg-white/5 border border-white/10 shadow-2xl hover:border-sky-500/50 backdrop-blur-md transition-all duration-300 text-left overflow-hidden hover:-translate-y-1 active:scale-95">
                      <div className="absolute inset-0 bg-gradient-to-br from-cyan-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                      <i className="fas fa-graduation-cap text-4xl text-sky-400 mb-4 relative z-10 drop-shadow-lg"></i>
                      <h2 className="text-2xl font-bold text-white mb-2 relative z-10">Portal Siswa</h2>
                      <p className="text-slate-400 relative z-10 text-sm leading-relaxed">Masuk untuk mengerjakan tes yang telah diaktifkan oleh Guru BK Anda.</p>
                      <div className="mt-6 flex items-center text-sky-400 font-bold opacity-0 group-hover:opacity-100 transform translate-x-[-10px] group-hover:translate-x-0 transition-all duration-300 relative z-10">
                        Masuk Portal <i className="fas fa-chevron-right ml-2"></i>
                      </div>
                    </button>
                  </div>
                </div>
              )}

              {role === 'counselor' && <CounselorPortal onLogout={handleLogout} isRefreshing={isRefreshing} onRefresh={globalRefresh} user={user} />}
              {role === 'student' && <StudentPortal onLogout={handleLogout} isRefreshing={isRefreshing} onRefresh={globalRefresh} user={user} />}
            </div>
          );
        }

        // ==========================================
        // PORTAL GURU BK (COUNSELOR)
        // ==========================================
        function CounselorPortal({ onLogout, isRefreshing, onRefresh, user }) {
          const [db, setDb] = useState({ activeTests: [], students: [], schoolData: {} });
          const [counselorSession, setCounselorSession] = useState(sessionStorage.getItem('eduTest_counselorSession'));
          const [copied, setCopied] = useState(false);
          const [activeTab, setActiveTab] = useState('dashboard');
          const [saveStatus, setSaveStatus] = useState('');
          const [showConfirmClear, setShowConfirmClear] = useState(false);
          const [showPassword, setShowPassword] = useState(false);
          const [loginError, setLoginError] = useState('');

          useEffect(() => {
            if(!user) return;
            const unsubscribe = dbRef.onSnapshot((doc) => {
                if (doc.exists) setDb(doc.data());
            }, (error) => console.error("Snapshot error:", error));
            return () => unsubscribe();
          }, [user]);

          const toggleTest = async (testId) => {
            try {
                const newActive = db.activeTests.includes(testId) 
                    ? db.activeTests.filter(id => id !== testId) 
                    : [...db.activeTests, testId];
                await dbRef.update({ activeTests: newActive });
            } catch (err) {}
          };

          const copyLink = () => {
            const link = "https://MINATPINTARSMAN3/login.siswa";
            navigator.clipboard.writeText(link).then(() => {
              setCopied(true); setTimeout(() => setCopied(false), 2000);
            });
          };

          const copyRealLinkForTesting = () => {
            const realLink = `${window.location.origin}${window.location.pathname}#student`;
            navigator.clipboard.writeText(realLink).then(() => {
              setSaveStatus('Tautan Uji Tersalin!');
              setTimeout(() => setSaveStatus(''), 2000);
            });
          };

          const handleSchoolDataChange = (e) => {
            const { name, value } = e.target;
            setDb(prev => ({ ...prev, schoolData: { ...prev.schoolData, [name]: value } }));
          };

          const saveSchoolData = async (e) => {
            e.preventDefault();
            try {
                await dbRef.update({ schoolData: db.schoolData });
                setSaveStatus('Tersimpan!'); setTimeout(() => setSaveStatus(''), 2000);
            } catch (err) {}
          };

          const deleteStudent = async (nisn) => {
            try {
                const updatedStudents = db.students.filter(s => s.nisn !== nisn);
                await dbRef.update({ students: updatedStudents });
            } catch (err) {}
          };

          const clearAllStudents = async () => {
            try {
                await dbRef.update({ students: [] });
                setShowConfirmClear(false);
            } catch (err) {}
          };

          const exportToCSV = () => {
            const { schoolData, students } = db;
            let csv = "LEMBAR HASIL ANALISIS TES SISWA\n\n";
            csv += `Nama Sekolah,,:,${schoolData.schoolName || '-'}\n`;
            csv += `Guru Pembimbing BK,,:,${schoolData.counselorName || '-'}\n`;
            csv += `NIP Guru BK,,:,${schoolData.counselorNip || '-'}\n`;
            csv += `Ditetapkan di,,:,${schoolData.city || '-'}\n`;
            csv += `Tanggal Cetak,,:,${schoolData.dateSet || '-'}\n\n`;
            csv += "No,Nama Siswa,Kelas,NISN,Modul Tes,Rekomendasi,Tindak Lanjut Guru BK,Saran untuk Siswa\n";
            
            students.forEach((s, idx) => {
              const analysis = generateAnalysis(s);
              const testName = TEST_CATALOG.find(t => t.id === s.currentTest)?.name || 'Belum memilih tes';
              csv += `${idx + 1},${s.name},${s.class},${s.nisn},"${testName}","${analysis.rekomendasi}","${analysis.tindakLanjut}","${analysis.saran}"\n`;
            });

            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.setAttribute('download', `Hasil_Analisis_${schoolData.schoolName ? schoolData.schoolName.replace(/\s+/g, '_') : 'Siswa'}.csv`);
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
          };

          const handleCounselorLogin = (e) => {
            e.preventDefault();
            const username = e.target.username.value;
            const password = e.target.password.value;
            
            if (username.trim() !== '' && password === 'BK2026') {
                sessionStorage.setItem('eduTest_counselorSession', 'active');
                setCounselorSession('active');
                setLoginError('');
            } else {
                setLoginError('Kata Sandi salah!');
            }
          };

          const handleCounselorLogout = () => {
            sessionStorage.removeItem('eduTest_counselorSession');
            onLogout();
          };

          if (!counselorSession) {
            return (
              <div className="absolute inset-0 flex items-center justify-center p-4 z-50 animate-fade-in bg-[#101015]">
                <div className="absolute top-[10%] left-[20%] w-96 h-96 bg-cyan-500/15 rounded-full blur-[120px] pointer-events-none"></div>

                <div className="flex w-full max-w-4xl bg-white/5 border border-white/10 rounded-[2rem] overflow-hidden shadow-2xl h-[550px] relative z-10 backdrop-blur-xl">
                  
                  <div className="hidden lg:flex lg:w-5/12 bg-white/5 border-r border-white/10 relative p-8 flex-col justify-center items-center text-center">
                    <div className="floating-logo relative rounded-full p-2 bg-white/10 backdrop-blur-md shadow-[0_0_30px_rgba(34,211,238,0.2)] border border-sky-500/30 shiny-effect mb-6">
                       <img src="https://i.ibb.co/nMH2M1Km/Chat-GPT-Image-20-Mei-2026-12-35-08.png" alt="Logo SMA 3 Sorong" fetchpriority="high" loading="eager" decoding="sync" className="w-28 h-28 object-contain drop-shadow-xl" />
                    </div>
                    <h2 className="text-xl font-black tracking-widest text-sky-500 uppercase mb-2">SMAN 3 KOTA SORONG</h2>
                    <h3 className="text-2xl font-bold text-white mb-2">Portal Guru BK</h3>
                    <p className="text-slate-400 text-sm leading-relaxed">Sistem manajemen evaluasi premium dan pemantauan real-time.</p>
                  </div>
                  
                  <div className="w-full lg:w-7/12 p-6 sm:p-10 flex flex-col justify-center relative">
                    <div className="mb-8 lg:hidden text-center flex flex-col items-center">
                       <div className="floating-logo relative rounded-full p-1 bg-white/5 border border-sky-500/30 mb-4">
                         <img src="https://i.ibb.co.com/nMH2M1Km/Chat-GPT-Image-20-Mei-2026-12-35-08.png" alt="Logo SMA 3 Sorong" fetchpriority="high" loading="eager" decoding="sync" className="w-20 h-20 object-contain" />
                       </div>
                      <h3 className="text-2xl font-bold text-white">Login Guru BK</h3>
                    </div>

                    <div className="mb-6 hidden lg:block">
                      <h3 className="text-2xl font-bold text-white mb-1">Selamat Datang!</h3>
                      <p className="text-slate-400 text-sm">Masukkan kredensial Anda untuk mengakses dashboard.</p>
                    </div>

                    <form onSubmit={handleCounselorLogin} className="space-y-4 relative z-10">
                      {loginError && (
                          <div className="bg-red-500/20 border border-red-500/50 text-red-400 px-4 py-2.5 rounded-xl text-sm font-bold text-center shadow-lg">
                              <i className="fas fa-exclamation-circle mr-2"></i> {loginError}
                          </div>
                      )}
                      <div>
                        <label className="block text-xs font-bold text-slate-400 ml-1 mb-1">Username (Nama Guru BK)</label>
                        <input required type="text" name="username" placeholder="Masukkan Nama Anda" 
                          className="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-sky-500/50 transition-all text-sm" />
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-400 ml-1 mb-1">Kata Sandi</label>
                        <div className="relative">
                          <input required type={showPassword ? "text" : "password"} name="password" placeholder="Masukkan Kata Sandi" 
                            className="w-full px-4 py-3 pr-12 bg-white/5 border border-white/10 rounded-xl text-white placeholder-slate-500 focus:outline-none focus:border-sky-500/50 transition-all text-sm" />
                          <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-1/2 -translate-y-1/2 text-slate-400 hover:text-sky-500 transition-colors focus:outline-none active:scale-90">
                            <i className={`fas ${showPassword ? 'fa-eye-slash' : 'fa-eye'}`}></i>
                          </button>
                        </div>
                      </div>
                      
                      <div className="pt-4">
                        <button type="submit" className="w-full py-3.5 bg-gradient-to-r from-cyan-500 to-sky-600 hover:from-cyan-400 hover:to-sky-500 text-slate-900 font-bold text-sm rounded-xl transition-all shadow-[0_5px_15px_rgba(34,211,238,0.3)] active:scale-[0.98]">
                          Masuk Dashboard
                        </button>
                      </div>
                    </form>
                    
                    <button type="button" onClick={onLogout} className="mt-6 text-xs font-medium text-slate-500 hover:text-sky-400 transition-colors self-center flex items-center p-2 rounded-lg hover:bg-white/5 active:scale-95">
                      <i className="fas fa-chevron-left mr-1"></i> Pilihan Portal
                    </button>
                  </div>
                </div>
              </div>
            );
          }

          return (
            <div className="h-full w-full flex overflow-hidden z-10 animate-fade-in relative bg-[#101015]">
              <div className="absolute top-[-15%] left-[-10%] w-[75%] h-[75%] bg-gradient-to-br from-cyan-400/30 via-sky-400/20 to-transparent rounded-full blur-[100px] pointer-events-none"></div>
              <div className="absolute top-[20%] left-[20%] w-[50%] h-[50%] bg-blue-400/20 rounded-full blur-[100px] pointer-events-none"></div>
              <div className="absolute bottom-[-15%] right-[-5%] w-[65%] h-[65%] bg-gradient-to-tl from-cyan-300/30 to-sky-500/15 rounded-full blur-[120px] pointer-events-none"></div>

                    <img src="https://i.ibb.co/nMH2M1Km/Chat-GPT-Image-20-Mei-2026-12-35-08.png" fetchpriority="high" loading="eager" decoding="sync" className="w-10 h-10 object-contain drop-shadow-lg" />

                       <h1 className="text-lg font-bold text-white tracking-tight">Portal BK</h1>
                       <p className="text-[10px] font-bold text-sky-500">SMAN 3 SORONG</p>
                    </div>
                  </div>
                </div>

                <nav className="flex-1 p-4 space-y-2 overflow-y-auto">
                  <button type="button" onClick={() => setActiveTab('dashboard')}
                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-sm font-medium hover:pl-5 ${activeTab === 'dashboard' ? 'bg-cyan-500/10 text-sky-400 border border-cyan-500/20 shadow-md' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}>
                    <i className="fas fa-tachometer-alt w-5 text-center"></i> <span>Modul Tes</span>
                  </button>
                  <button type="button" onClick={() => setActiveTab('students')}
                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-sm font-medium hover:pl-5 ${activeTab === 'students' ? 'bg-cyan-500/10 text-sky-400 border border-cyan-500/20 shadow-md' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}>
                    <i className="fas fa-desktop w-5 text-center"></i> <span>Status Peserta</span>
                  </button>
                  <button type="button" onClick={() => setActiveTab('hasil_analisis')}
                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-sm font-medium hover:pl-5 ${activeTab === 'hasil_analisis' ? 'bg-cyan-500/10 text-sky-400 border border-cyan-500/20 shadow-md' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}>
                    <i className="fas fa-file-excel w-5 text-center"></i> <span>Hasil Analisis</span>
                  </button>
                  <button type="button" onClick={() => setActiveTab('school')}
                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-sm font-medium hover:pl-5 ${activeTab === 'school' ? 'bg-cyan-500/10 text-sky-400 border border-cyan-500/20 shadow-md' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}>
                    <i className="fas fa-building w-5 text-center"></i> <span>Data Sekolah</span>
                  </button>
                  <button type="button" onClick={() => setActiveTab('guide')}
                    className={`w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-sm font-medium hover:pl-5 ${activeTab === 'guide' ? 'bg-cyan-500/10 text-sky-400 border border-cyan-500/20 shadow-md' : 'text-slate-400 hover:bg-white/5 hover:text-white'}`}>
                    <i className="fas fa-book w-5 text-center"></i> <span>Panduan Aplikasi</span>
                  </button>
                </nav>

                <div className="p-4 border-t border-white/10">
                  <button type="button" onClick={handleCounselorLogout} className="w-full flex items-center justify-center space-x-2 px-4 py-2.5 rounded-xl bg-red-500/10 hover:bg-red-500/20 text-red-400 text-sm font-medium transition-all active:scale-95">
                    <i className="fas fa-sign-out-alt"></i> <span>Keluar</span>
                  </button>
                </div>
              </aside>

                    <div className="flex space-x-1">
                      <button type="button" onClick={() => setActiveTab('dashboard')} className={`p-2 rounded-lg border transition-all active:scale-90 ${activeTab === 'dashboard' ? 'bg-cyan-500/20 text-sky-400 border-cyan-500/30' : 'bg-transparent text-slate-400 border-transparent'}`}><i className="fas fa-tachometer-alt"></i></button>
                      <button type="button" onClick={() => setActiveTab('students')} className={`p-2 rounded-lg border transition-all active:scale-90 ${activeTab === 'students' ? 'bg-cyan-500/20 text-sky-400 border-cyan-500/30' : 'bg-transparent text-slate-400 border-transparent'}`}><i className="fas fa-desktop"></i></button>
                      <button type="button" onClick={() => setActiveTab('hasil_analisis')} className={`p-2 rounded-lg border transition-all active:scale-90 ${activeTab === 'hasil_analisis' ? 'bg-cyan-500/20 text-sky-400 border-cyan-500/30' : 'bg-transparent text-slate-400 border-transparent'}`}><i className="fas fa-file-excel"></i></button>
                      <button type="button" onClick={() => setActiveTab('school')} className={`p-2 rounded-lg border transition-all active:scale-90 ${activeTab === 'school' ? 'bg-cyan-500/20 text-sky-400 border-cyan-500/30' : 'bg-transparent text-slate-400 border-transparent'}`}><i className="fas fa-building"></i></button>
                      <button type="button" onClick={() => setActiveTab('guide')} className={`p-2 rounded-lg border transition-all active:scale-90 ${activeTab === 'guide' ? 'bg-cyan-500/20 text-sky-400 border-cyan-500/30' : 'bg-transparent text-slate-400 border-transparent'}`}><i className="fas fa-book"></i></button>
                    </div>
                </header>

                        <h2 className="text-2xl font-bold text-white">Manajemen Tes</h2>
                        <p className="text-slate-400 text-sm mt-1">Aktifkan modul tes untuk dibagikan ke peserta.</p>
                      </div>

                      <div className="bg-gradient-to-r from-cyan-500/20 via-sky-600/10 to-transparent rounded-2xl p-6 md:p-8 shadow-xl relative overflow-hidden border border-cyan-500/30 flex flex-col md:flex-row items-center justify-between hover:border-cyan-400/50 transition-colors">

                        <div className="relative z-10 mb-4 md:mb-0 md:pr-6 text-center md:text-left flex-1">
                          <h3 className="text-lg font-bold text-sky-400 mb-1 flex items-center justify-center md:justify-start">
                            <i className="fas fa-link mr-2"></i> Tautan Akses Siswa
                          </h3>
